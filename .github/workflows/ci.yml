name: ci

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
      - name: vet
        run: go vet ./...
